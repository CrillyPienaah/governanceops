model_id: credit_model_v3
model_name: "Credit Risk Scoring Model v3"
model_type: credit_risk
use_case: retail_credit_adjudication
version: "3.0.0"
owner: "model-risk-team@bank.com"
created_date: "2026-05-15"
framework: XGBoost
language: Python

description: >
  Credit risk scoring model for retail credit adjudication.
  Trained on 5.1M applications from 2023-2025.

training_data:
  source: "internal_credit_db"
  date_range: "2023-01-01 to 2025-12-31"
  size: 5100000
  features: 62

documentation:
  fairness_testing: true
  drift_monitoring: true
  independent_validation: true
  osfi_e23_mapping: true
  audit_trail: true

intended_use:
  - retail_credit_scoring
  - credit_limit_setting

out_of_scope:
  - commercial_lending
  - mortgage_underwriting

regulatory_framework: OSFI E-23
deployment_environment: production
risk_tier: LOW
